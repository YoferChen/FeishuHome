name: 部署到 GitHub Pages

# 触发条件：push 到 master 分支
on:
  push:
    branches:
      - master
  # 允许手动触发工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行和最新队列之间的运行
# 但是，不要取消正在进行的运行，因为我们希望完成这些生产部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 2. 设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: npm ci
      
      # 4. 运行测试
      - name: 运行测试
        run: npm run test
      
      # 5. 预取博客数据
      # 从飞书多维表格获取最新博客数据
      - name: 预取博客数据
        run: npm run fetch-blogs
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
      
      # 6. 预取配置数据
      # 从飞书多维表格获取网站配置、个人信息、教育经历、项目经历、里程碑、主题样式
      - name: 预取配置数据
        run: npm run fetch-config
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_TABLE_ID_SITE_CONFIG: ${{ secrets.FEISHU_TABLE_ID_SITE_CONFIG }}
          FEISHU_TABLE_ID_PROFILE: ${{ secrets.FEISHU_TABLE_ID_PROFILE }}
          FEISHU_TABLE_ID_EDUCATION: ${{ secrets.FEISHU_TABLE_ID_EDUCATION }}
          FEISHU_TABLE_ID_PROJECTS: ${{ secrets.FEISHU_TABLE_ID_PROJECTS }}
          FEISHU_TABLE_ID_MILESTONES: ${{ secrets.FEISHU_TABLE_ID_MILESTONES }}
          FEISHU_TABLE_ID_THEME: ${{ secrets.FEISHU_TABLE_ID_THEME }}
      
      # 7. 构建项目
      - name: 构建项目
        run: npm run build
        env:
          # 如果部署在 GitHub Pages 的子路径下（如 https://username.github.io/repo-name/）
          # 需要设置 BASE_PATH 为 /repo-name/
          # 如果部署在根路径（如 https://username.github.io/ 或自定义域名），则设置为 /
          BASE_PATH: ${{ github.event.repository.name != github.event.repository.owner.login && format('/{0}/', github.event.repository.name) || '/' }}
      
      # 8. 配置 GitHub Pages
      - name: 配置 Pages
        uses: actions/configure-pages@v4
      
      # 9. 上传构建产物
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # 部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
